# Nginx Configuration for Mindsyncpro

# Frontend reverse proxy (http://mindsyncpro.online and http://www.mindsyncpro.online)
server {
    listen 80;
    server_name mindsyncpro.online www.mindsyncpro.online;

    # Redirect http to https (uncomment after running Certbot / enabling SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API reverse proxy (http://api.mindsyncpro.online)
server {
    listen 80;
    server_name api.mindsyncpro.online;

    # Redirect http to https (uncomment after running Certbot / enabling SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
